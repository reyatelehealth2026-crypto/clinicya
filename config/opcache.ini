; PHP OPcache settings for Odoo Dashboard performance
; Deploy: copy to /etc/php/8.x/fpm/conf.d/99-opcache-dashboard.ini
; or add to php.ini / pool .conf (php_admin_value[opcache.xxx])
;
; ผลลัพธ์ที่คาดหวัง:
;   - odoo-dashboard-api.php (~182KB, 4932 บรรทัด) จาก parse 1.3s → 0ms (cached)
;   - ทุก API endpoint เริ่มทำงานเร็วขึ้น ~50-80%

[opcache]
opcache.enable                = 1
opcache.enable_cli            = 0
opcache.memory_consumption    = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
; ตรวจสอบไฟล์เปลี่ยนแปลงทุก 60 วินาที (production: ตั้งเป็น 0 แล้ว clear manual)
opcache.revalidate_freq       = 60
opcache.fast_shutdown         = 1
; เพิ่ม JIT สำหรับ PHP 8+ (optional — ต้องการ opcache.jit_buffer_size)
; opcache.jit                 = tracing
; opcache.jit_buffer_size     = 64M

; ตรวจสอบสถานะ:
;   php -r "var_dump(opcache_get_status()['opcache_enabled']);"
; Clear cache หลัง deploy:
;   php -r "opcache_reset();"
; หรือผ่าน nginx: touch /var/run/php/php8.x-fpm.sock (reload FPM)
